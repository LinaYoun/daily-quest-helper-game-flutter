<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="daily_quest_helper">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>daily_quest_helper</title>
  <link rel="manifest" href="manifest.json">
  <!-- Fonts: Ensure Korean and Emoji fonts load reliably -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <!-- Load sql.js for Drift WebDatabase. Must be available before Flutter starts. -->
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/sql-wasm.js"></script>
  <script>
    (function(){
      var cdn = 'https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/';
      if (window.initSqlJs && !window.__sqljsLocateFileSet) {
        var original = window.initSqlJs;
        window.initSqlJs = function(cfg){
          cfg = cfg || {};
          if (!cfg.locateFile) cfg.locateFile = function(file){ return cdn + file; };
          return original(cfg);
        };
        window.__sqljsLocateFileSet = true;
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
